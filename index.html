<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI Service Buddy</title>
  <link rel="stylesheet" href="style.css?v=20260412b" />
</head>
<body class="neo-chat-page">
  <div id="sidebarBackdrop" class="drawer-backdrop" aria-hidden="true"></div>

  <div class="neo-shell">
    <aside id="sidebar" class="history-drawer">
      <div class="drawer-top">
        <p class="drawer-kicker">AI SERVICE BUDDY</p>
        <h1 class="drawer-title">Smart Mechanic</h1>
        <button id="newChatBtn" class="drawer-new-btn" type="button">เริ่มแชทใหม่</button>
      </div>

      <section class="drawer-history" aria-label="ประวัติแชท">
        <p class="drawer-section-title">แชทล่าสุด</p>
        <div id="chatHistoryList" class="drawer-history-list"></div>
      </section>

      <footer class="drawer-footer">
        <span class="drawer-status-label">สถานะระบบ</span>
        <span id="apiStatus" class="drawer-status-value">พร้อมใช้งาน</span>
      </footer>
    </aside>

    <main class="neo-main">
      <header class="neo-topbar">
        <button id="toggleSidebarBtn" class="topbar-menu" type="button" aria-label="เปิดประวัติแชท">☰</button>
        <div class="topbar-copy">
          <h2 class="topbar-title">Service Copilot Chat</h2>
          <p class="topbar-subtitle">วิเคราะห์อาการรถแบบคุยกับช่างจริง</p>
        </div>
      </header>

      <section id="chatThread" class="neo-thread" aria-live="polite"></section>

      <div id="quickPrompts" class="neo-prompts" aria-label="คำถามแนะนำ"></div>

      <form id="composerForm" class="neo-composer" autocomplete="off">
        <label class="visually-hidden" for="chatInput">พิมพ์ข้อความ</label>
        <textarea
          id="chatInput"
          class="neo-input"
          rows="1"
          placeholder="อธิบายอาการรถ เช่น สตาร์ทติดยากตอนเช้า"
        ></textarea>
        <button id="sendBtn" class="neo-send" type="submit">ส่ง</button>
      </form>
    </main>
  </div>

  <script src="script.js?v=20260412b"></script>
</body>
</html>
