<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI Service Buddy</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="home-page">

  <div class="container">
    <header class="page-header">
      <p class="eyebrow">ISUZU</p>

    <div class="search-box" role="search">
      <label class="visually-hidden" for="searchInput">ค้นหา</label>

        placeholder="ค้นหา..."
        id="searchInput"
        autocomplete="off"
      />

    <section class="answer-card" id="answerCard" aria-live="polite">
      <p class="answer-label">คำตอบจาก AI</p>
      <p class="answer-text" id="answerText">พิมพ์คำถามแล้วกด Enter เพื่อเริ่มใช้งาน</p>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
