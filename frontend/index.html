<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI Service Buddy</title>
  <link rel="stylesheet" href="/css/index.css?v=20260412b" />
</head>
<body class="home-page">

  <aside id="sidebar" class="neo-sidebar">
    <div class="sidebar-header">
      <div class="brand">
        <img src="assets/logo.svg" alt="ISUZU" class="logo-sidebar" />
      </div>
      <button id="closeSidebarBtn" class="close-btn" type="button">✕</button>
    </div>

    <button id="sidebarNewChatBtn" class="sidebar-action-btn">
      <img src="assets/newchat.svg" width="20" alt="New Chat" /> 
      <span>เริ่มแชทใหม่</span>
    </button>

    <div class="sidebar-section">
      <h3 class="sidebar-section-title">แชทล่าสุด</h3>
      <div id="chatHistoryList" class="history-list"></div>
    </div>
  </aside>

  <div id="sidebarBackdrop" class="drawer-backdrop"></div>
  <div class="neo-shell">
    
    <div class="top-bar">
      <div class="top-bar-icons"> 
        <button id="hamburgerBtn" class="hamburger-btn" type="button">
          <img src="assets/hamburger.svg" width="30" alt="Menu" /> 
        </button>
        <button id="newChatBtn" class="new-btn" type="button">
          <img src="assets/newchat.svg" width="27" alt="New Chat" />
        </button>
      </div>
      <h1 class="top-bar-text">AI Service Buddy</h1> 
    </div>

    <main class="neo-main">
      
      <div class="hero-section">
        <img src="assets/logo.svg" alt="ISUZU" class="hero-logo" />
      </div>
      
      <section id="chatThread" class="neo-thread" aria-live="polite"></section>

      <div id="quickPrompts" class="neo-prompts" aria-label="คำถามแนะนำ"></div>

      <form id="composerForm" class="neo-composer" autocomplete="off">
        <label class="visually-hidden" for="chatInput">พิมพ์ข้อความ</label>
        <textarea
          id="chatInput"
          class="neo-input"
          rows="1"
          placeholder="อธิบายอาการรถ เช่น สตาร์ทติดยากตอนเช้า"
        ></textarea>
        <button id="sendBtn" class="neo-send" type="submit">ส่ง</button>
      </form>

    </main>
  </div>
  <div id="apiStatus" style="display:none;"></div>

  <script src="/js/script.js?v=20260412b"></script>
</body>
</html>
